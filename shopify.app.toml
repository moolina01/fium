# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "1139f7275aa83f9acb0d3cf003e15947"
name = "fium"
# URL de producción (Railway). En dev el CLI la sobreescribe con el tunnel
# (automatically_update_urls_on_dev = true).
application_url = "https://fium-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/paid"
  topics = [ "orders/paid" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Webhooks de cumplimiento GDPR — obligatorios para apps públicas.
  # Van en su propia sección, NO como topics de subscriptions.
  [webhooks.privacy_compliance]
  customer_data_request_url = "/webhooks/customers/data_request"
  customer_deletion_url = "/webhooks/customers/redact"
  shop_deletion_url = "/webhooks/shop/redact"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Solo los scopes que la app realmente usa: lectura de órdenes, fulfillments y carrier service.
scopes = "read_orders,read_fulfillments,write_fulfillments,write_shipping"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://fium-production.up.railway.app/auth/callback",
  "https://fium-production.up.railway.app/auth/shopify/callback",
  "https://fium-production.up.railway.app/api/auth/callback"
]
